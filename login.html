<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ШЕДЕВРО ЧАТ - Вход</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #0f0;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Matrix rain effect */
    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.1;
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.95);
      padding: 60px 50px;
      border-radius: 20px;
      box-shadow: 0 0 80px rgba(0, 255, 0, 0.5);
      border: 2px solid #0f0;
      text-align: center;
      max-width: 450px;
      width: 90%;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 40px rgba(0, 255, 0, 0.3); }
      to { box-shadow: 0 0 80px rgba(0, 255, 0, 0.6); }
    }

    h1 {
      font-size: 48px;
      margin-bottom: 15px;
      color: #0f0;
      text-shadow: 0 0 20px #0f0;
      letter-spacing: 5px;
      animation: flicker 3s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }

    .subtitle {
      font-size: 14px;
      color: #0c0;
      margin-bottom: 50px;
      letter-spacing: 2px;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      padding: 20px 30px;
      background: #0f0;
      color: #000;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      width: 100%;
      font-family: Arial, sans-serif;
    }

    .google-btn:hover {
      background: #0c0;
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0, 255, 0, 0.8);
    }

    .google-icon {
      width: 24px;
      height: 24px;
    }

    .features {
      margin-top: 40px;
      text-align: left;
      font-size: 14px;
      color: #0c0;
    }

    .features div {
      margin: 12px 0;
      padding-left: 25px;
      position: relative;
    }

    .features div:before {
      content: "►";
      position: absolute;
      left: 0;
      color: #0f0;
    }

    .terminal {
      margin-top: 30px;
      background: #000;
      border: 1px solid #0f0;
      border-radius: 8px;
      padding: 15px;
      font-size: 12px;
      text-align: left;
      color: #0f0;
      overflow: hidden;
    }

    .terminal-line {
      opacity: 0;
      animation: typeLine 0.5s forwards;
    }

    .terminal-line:nth-child(1) { animation-delay: 0.5s; }
    .terminal-line:nth-child(2) { animation-delay: 1s; }
    .terminal-line:nth-child(3) { animation-delay: 1.5s; }

    @keyframes typeLine {
      to { opacity: 1; }
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: #0f0;
      margin-left: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  
  <div class="container">
    <h1>ШЕДЕВРO ЧАТ</h1>
    <p class="subtitle">SECURE MESSAGING SYSTEM v2.0</p>
    
    <a href="/auth/google" class="google-btn">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Войти через Google
    </a>

    <div class="features">
      <div>Безопасная регистрация через Google</div>
      <div>Друзья и групповые чаты</div>
      <div>Отправка файлов и медиа</div>
      <div>Шифрованные сообщения</div>
    </div>

    <div class="terminal">
      <div class="terminal-line">$ system.init()</div>
      <div class="terminal-line">$ loading_modules...</div>
      <div class="terminal-line">$ ready_to_connect<span class="cursor"></span></div>
    </div>
  </div>

  <script>
    // Matrix rain effect
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン01';
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    
    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#0f0';
      ctx.font = `${fontSize}px monospace`;
      
      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }
    
    setInterval(draw, 33);
    
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
